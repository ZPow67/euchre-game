<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euchre</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="game-container">

        <!-- Scoreboard -->
        <div class="scoreboard">
            <div class="score-item">
                <span class="score-label">You & Partner</span>
                <span class="score-value" id="score-team1">0</span>
            </div>
            <div class="score-divider">—</div>
            <div class="score-item">
                <span class="score-label">Opponents</span>
                <span class="score-value" id="score-team2">0</span>
            </div>
        </div>

        <!-- Partner at the top -->
        <div class="opponent-top">
            <p>Partner</p>
            <div class="card-row" id="hand-partner"></div>
        </div>

        <!-- Middle row -->
        <div class="middle-row">

            <!-- Left opponent -->
            <div class="opponent-side">
                <p>Opponent 1</p>
                <div class="card-row" id="hand-opponent1"></div>
            </div>

            <!-- The table -->
            <div class="table">
                <div class="table-info">
                    <div id="trump-indicator" class="trump-indicator"></div>
                </div>

                <!-- Cards played on table -->
                <div class="played-cards">
                    <div class="played-top">
                        <div id="played-partner" class="played-card-slot"></div>
                    </div>
                    <div class="played-middle">
                        <div id="played-opponent1" class="played-card-slot"></div>
                        <div class="table-center">
                            <div id="face-up-card"></div>
                        </div>
                        <div id="played-opponent2" class="played-card-slot"></div>
                    </div>
                    <div class="played-bottom">
                        <div id="played-player" class="played-card-slot"></div>
                    </div>
                </div>
            </div>

            <!-- Right opponent -->
            <div class="opponent-side">
                <p>Opponent 2</p>
                <div class="card-row" id="hand-opponent2"></div>
            </div>

        </div>

        <!-- Your hand at the bottom -->
        <div class="your-hand">
            <div class="card-row" id="hand-player"></div>
        </div>

        <!-- Game message log -->
        <div id="game-message" class="game-message"></div>

        <!-- Action buttons -->
        <div class="buttons" id="action-buttons"></div>
        <!-- Debug Panel -->
        <div id="debug-panel" class="debug-panel">
            <p><strong>🔧 Debug Info</strong></p>
            <p>Trump: <span id="debug-trump">-</span></p>
            <p>Lead Suit: <span id="debug-lead">-</span></p>
            <p>Bidding Round: <span id="debug-bidround">-</span></p>
            <p>Current Player: <span id="debug-player">-</span></p>
            <p>Dealer: <span id="debug-dealer">-</span></p>
            <p>Tricks Played: <span id="debug-tricks">-</span></p>
            <p>Team 1 Tricks: <span id="debug-t1tricks">-</span></p>
            <p>Team 2 Tricks: <span id="debug-t2tricks">-</span></p>
            <p>On Offence: <span id="debug-offence">-</span></p>
        </div>

    </div>

    <script src="deck.js"></script>
    <script src="players.js"></script>
    <script src="display.js"></script>
    <script src="scoring.js"></script>
    <script src="ai.js"></script>
    <script src="tricks.js"></script>
    <script src="setup.js"></script>
    <script src="bidding.js"></script>
    <script src="game.js"></script>
</body>

</html>
